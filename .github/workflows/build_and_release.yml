name: Build and Release DarkFox FIRM

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM
      PATH: /opt/devkitpro/devkitARM/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: apt-get update && apt-get install -y python3 make

      - name: Build Firmware Binaries
        run: |
          make clean
          make

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: y_firm_darkfox.firm
          name: ${{ github.ref_type == 'tag' && format('DarkFox Firmware Release {0}', github.ref_name) || 'DarkFox Firmware Latest Build' }}
          tag_name: ${{ github.ref_type == 'tag' && github.ref || 'latest' }}
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }}
