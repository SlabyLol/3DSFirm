name: Build and Release DarkFox FIRM

on:
  push:
    branches: [ "main" ] # Trigger bei normalem Push
    tags:
      - 'v*'          # Trigger bei Versions-Tags (z.B. v1.0.0)

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest # Offizielle 3DS-Compiler-Umgebung

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          # Paketquellen aktualisieren und Python 3 + Make installieren
          apt-get update && apt-get install -y python3 make
          # Core-3DS-Entwicklerbibliotheken von devkitPro bereitstellen
          dkp-pacman -Syu --noconfirm 3ds-dev

      - name: Build Firmware Binaries
        run: |
          # Führt das Makefile im Root-Verzeichnis aus
          make clean
          make

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: y_firm_darkfox.firm
          # Wenn es ein Tag ist, nimm den Tag-Namen, ansonsten nenne es "Latest Build"
          name: ${{ github.ref_type == 'tag' && format('DarkFox Firmware Release {0}', github.ref_name) || 'DarkFox Firmware Latest Build' }}
          tag_name: ${{ github.ref_type == 'tag' && github.ref || 'latest' }}
          draft: false
          prerelease: ${{ github.ref_type != 'tag' }} # Normale Pushes werden als Vorabversion markiert
