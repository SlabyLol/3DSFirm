name: DarkFox Co. Hardware Compilation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Holt den Quellcode aus dem Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Richtet die devkitARM Toolchain ein
      - name: Setup devkitARM Environment
        uses: devkitPro/actions/setup-devkitarm@v2

      # 3. Installiert firmtool global via pipx und fügt es dem PATH hinzu
      - name: Install firmtool Dependency
        run: |
          pipx install git+https://github.com/TuxSH/firmtool.git
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # 4. Führt das automatisierte Makefile aus
      - name: Compile and Pack Firmware
        run: |
          make

      # 5. Lädt die fertige .firm Datei als GitHub-Artefakt hoch
      - name: Upload Compiled Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: y_firm_darkfox
          path: y_firm_darkfox.firm
