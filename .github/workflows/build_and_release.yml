name: DarkFox Co. Hardware Compilation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Führt alle Schritte direkt im offiziellen devkitARM-Container aus
    container: devkitpro/devkitarm:latest

    steps:
      # 1. Holt den Quellcode aus dem Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Aktualisiert apt und installiert python3-pip im Container
      - name: Install Python3 Pip
        run: |
          apt-get update
          apt-get install -y python3-pip

      # 3. Installiert firmtool direkt über das nun verfügbare pip Module
      - name: Install firmtool Dependency
        run: |
          python3 -m pip install --break-system-packages git+https://github.com/TuxSH/firmtool.git

      # 4. Führt die Makefile-Automatisierungsregeln aus
      - name: Compile and Pack Firmware
        run: |
          make

      # 5. Lädt die fertige .firm Datei als GitHub-Artefakt hoch
      - name: Upload Compiled Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: y_firm_darkfox
          path: y_firm_darkfox.firm
