name: DarkFox Co. Hardware Compilation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Run all steps directly inside the official devkitARM container environment
    container: devkitpro/devkitarm:latest

    steps:
      # 1. Pull the codebase into the container workspace
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Python environment inside the container
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install firmtool inside the active environment
      - name: Install firmtool Dependency
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/TuxSH/firmtool.git

      # 4. Execute the Makefile automation rules
      - name: Compile and Pack Firmware
        run: |
          make

      # 5. Export the successfully generated .firm binary asset
      - name: Upload Compiled Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: y_firm_darkfox
          path: y_firm_darkfox.firm
